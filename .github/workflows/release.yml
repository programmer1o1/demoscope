name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Package
        run: |
          cd target/x86_64-unknown-linux-gnu/release
          tar czf demoscope-${{ github.ref_name }}-linux-x86_64.tar.gz demoscope
          mv demoscope-${{ github.ref_name }}-linux-x86_64.tar.gz $GITHUB_WORKSPACE/
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: demoscope-${{ github.ref_name }}-linux-x86_64.tar.gz

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc
      - name: Package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target\x86_64-pc-windows-msvc\release\demoscope.exe" `
            -DestinationPath "demoscope-${{ github.ref_name }}-windows-x86_64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: demoscope-${{ github.ref_name }}-windows-x86_64.zip

  build-macos:
    name: macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin
      - name: Build arm64
        run: cargo build --release --target aarch64-apple-darwin
      - name: Create universal binary
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/demoscope \
            target/aarch64-apple-darwin/release/demoscope \
            -output demoscope-universal
      - name: Package
        run: |
          tar czf demoscope-${{ github.ref_name }}-macos-universal.tar.gz demoscope-universal
      - uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: demoscope-${{ github.ref_name }}-macos-universal.tar.gz

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
